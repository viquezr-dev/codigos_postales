<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html, #mapid { width: 100%; height: 100%; margin: 0; padding: 0; background: #ddd; }
        
        /* Buscador Superior */
        .search-container {
            position: absolute; top: 10px; right: 10px; z-index: 5000; display: flex; gap: 5px;

        }

        .leaflet-top.leaflet-right { margin-top: 70px !important; }

        .label-macro { color: #1a73e8!important; font-size: 15px; }

        .popup-header { font-weight: bold; display: block; margin-bottom: 3px; border-bottom: 1px solid #eee; padding-bottom: 2px; text-align: center; font-size: 9px; text-transform: uppercase; color: #666; }
        .codigo-final { background: #1a2a6c; color: white; padding: 6px; border-radius: 4px; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 5px; border: 1px solid #f1c40f; }
        
        .btn-container { display: flex; gap: 3px; justify-content: center; flex-wrap: wrap; }
        .btn-maps, .btn-ws { padding: 4px 8px; border-radius: 3px; text-decoration: none; font-size: 10px; font-weight: bold; color: white !important; }
        .btn-maps { background: #4285F4; }
        .btn-ws { background: #25D366; }
        .btn-cercana { background: #003366; color: white !important; border: none; padding: 5px; border-radius: 3px; cursor: pointer; font-size: 10px; font-weight: bold; width: 100%; margin-top: 3px; }
        
        .distancia-label { background: #e74c3c; color: black; border: none; font-weight: bold; border-radius: 10px; padding: 2px 8px; font-size: 11px; }
        .locate-button { position: absolute; bottom: 30px; left: 10px; z-index: 1000; background: white; width: 36px; height: 36px; border-radius: 4px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.3); border: none; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .inv { background: none; border: none; }

        .map-title { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; pointer-events: none; width: 100%; }
        .map-title h1 { margin: 0; font-size: 18px; color: #1a2a6c; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; text-shadow: 2px 2px 0px #fff; }
        .map-title span { font-size: 10px; color: #333; display: block; font-weight: bold; margin-top: -2px; }
        
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.75) !important; 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-radius: 8px; /* Opcional: le da esquinas redondeadas */
        }
    
        .leaflet-popup-tip {
            display:none;            /* background: rgba(255, 255, 255, 0.7) !important; */
        }

        .qr-code-estilo {
            width: 120px !important; 
            height: 120px !important;
            background-color: white !important; 
            border: 5px solid white !important; 
            border-radius: 0px !important;      
            image-rendering: pixelated;         
            image-rendering: crisp-edges;
            display: block;
            margin: 5px auto;
            max-width: 150px; 
            height: auto;
        }

            .coords-label {
            font-size: 9px;
            color: #666;
            text-align: center;
            display: block;
            margin-top: 5px;
            font-family: monospace;
        }
        

        
    </style>
</head>
<body>

<div class="map-title">
    <h1>SISTEMAS POSTALES DE PANAMÁ</h1>
    <span>DIRECCIÓN GENERAL DE CORREOS Y TELÉGRAFOS (COTEL)</span>
</div>

<div class="search-container">
    <input type="text" id="search-input" placeholder="CÓDIGO POSTAL..." maxlength="12">
    <button id="search-btn">IR</button>
</div>

<button class="locate-button" title="Mi Ubicación" onclick="findMe()">🧭</button>
<div id="mapid"></div>

<script>

let modoSelectorZonasActivo = false;
const ORIGIN = { lat: 10.0, lng: -83.0 };
const PARAMS = {
    RES_MACRO: 0.143, 
    RES_MICRO: 0.143/24, 
    RES_NANO: (0.143/24)/25, 
    RES_PICO: ((0.143/24)/25)/8, 
    ALFA: "23456789ABCDEFGHJKLMNPQRSTVWXZ", 
    MACRO_X_COUNT: Math.ceil((77.0 - 83.0) / -0.143)
};

const mapaCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 22,
    maxNativeZoom: 19,
    attribution: 'COTEL Panamá | © OpenStreetMap'
});

const mapaSatelite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
    maxZoom: 22,
    attribution: 'COTEL Panamá | © Google Maps'
});

// 2. Inicializamos el mapa con el de calles por defecto
const mymap = L.map('mapid', { 
    zoomSnap: 0.1, 
    zoomControl: false, 
    maxZoom: 22,
    layers: [mapaCalles] // Esto carga el mapa de calles al abrir
}).setView([8.5, -80.0], 8);

// 3. El control del Zoom se mantiene igual
L.control.zoom({ position: 'bottomright' }).addTo(mymap);
// Capas
const layerZonas = L.geoJSON(null, { 
    style: { color: "#333", weight: 1.5, fillOpacity: 0.1, fillColor: "#3498db" },
    onEachFeature: (f, l) => {
        l.on({
            mouseover: (e) => { if(mymap.hasLayer(layerZonas)) e.target.setStyle({ weight: 3, color: '#f1c40f', fillOpacity: 0.3 }); },
            mouseout: (e) => { layerZonas.resetStyle(e.target); }
        });
    }
}).addTo(mymap);

const layerMacro = L.layerGroup().addTo(mymap);
const layerMicro = L.layerGroup().addTo(mymap);
const layerNano = L.layerGroup().addTo(mymap);
const layerRutas = L.layerGroup().addTo(mymap);
const layerEstafetas = L.layerGroup().addTo(mymap);
const layerMiUbicacion = L.layerGroup().addTo(mymap);
const selectionLayer = L.layerGroup().addTo(mymap);
const distanceLayer = L.layerGroup().addTo(mymap);

fetch('estafetas.geojson').then(r => r.json()).then(data => layerZonas.addData(data));

fetch('estafetasl.geojson').then(r => r.json()).then(data => {
    L.geoJSON(data, {
        style: { color: 'red', weight: 3, opacity: 0.7 },
        onEachFeature: (f, l) => { l.bindPopup(`<b>RUTA:</b> ${f.properties.RUTA || 'SIN IDENTIFICAR'}`); }
    }).addTo(layerRutas);
});

fetch('estafetasp.geojson').then(r => r.json()).then(data => {
    L.geoJSON(data, {
        pointToLayer: (f, ll) => L.circleMarker(ll, { radius: 7, fillColor: '#27ae60', color: '#fff', weight: 2, fillOpacity: 1 }),
        onEachFeature: (f, l) => { l.bindPopup(`<b>ESTAFETA:</b> ${f.properties.ESTAF_NAME || 'SIN NOMBRE'}`); }
    }).addTo(layerEstafetas);
});

// --- FUNCIONES CORE ---

function pointInPolygon(point, vs) {
    const polygon = vs[0];
    let x = point[0], y = point[1];
    let inside = false;
    for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        let xi = polygon[i][0], yi = polygon[i][1];
        let xj = polygon[j][0], yj = polygon[j][1];
        let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

function obtenerInfoAdicional(vmLevel2d) {
    let info = { estafeta: "No asignada", provincia: "No disponible" };
    
    // Recorremos los features cargados en layerZonas
    layerZonas.eachLayer(layer => {
        if (layer.feature.properties.VM_LEVEL2D === vmLevel2d) {
            info.estafeta = layer.feature.properties.ESTAF_NAME || "Sin estafeta";
            info.provincia = layer.feature.properties.PROV_NOMB || "Sin provincia";
        }
    });
    return info;
}
    
function isPointInGeoJSON(latlng, feature) {
    const pt = [latlng.lng, latlng.lat];
    const coords = feature.geometry.coordinates;
    const type = feature.geometry.type;
    if (type === "Polygon") return pointInPolygon(pt, coords);
    if (type === "MultiPolygon") return coords.some(poly => pointInPolygon(pt, poly));
    return false;
}

function encode(num, len) {
    let s = ""; let n = Math.abs(Math.floor(num));
    for (let i = 0; i < len; i++) { s = PARAMS.ALFA[n % 30] + s; n = Math.floor(n / 30); }
    return s;
}

function getGridInfo(lat, lng) {
    const totalPicoX = Math.floor(((lng - ORIGIN.lng) / PARAMS.RES_PICO) + 0.00001);
    const totalPicoY = Math.floor(((ORIGIN.lat - lat) / PARAMS.RES_PICO) + 0.00001);
    const totalNanoX = Math.floor(totalPicoX / 8);
    const totalNanoY = Math.floor(totalPicoY / 8);
    const mx = Math.floor(totalNanoX / (24 * 25)), my = Math.floor(totalNanoY / (24 * 25));
    const microX = Math.floor((totalNanoX % (24 * 25)) / 25), microY = Math.floor((totalNanoY % (24 * 25)) / 25);
    const nanoX = totalNanoX % 25, nanoY = totalNanoY % 25;
    const picoX = totalPicoX % 8, picoY = totalPicoY % 8;
    return { macro: encode((my * PARAMS.MACRO_X_COUNT) + mx, 2), micro: encode((microY * 24) + microX, 2), nano: encode((nanoY * 25) + nanoX, 2), pico: encode((picoY * 8) + picoX, 2) };
}

    function toggleSelectorZonas() {
    modoSelectorZonasActivo = !modoSelectorZonasActivo;
    
    if (modoSelectorZonasActivo) {
        // Limpiamos todo al activar el modo selección
        selectionLayer.clearLayers();
        // Opcional: podrías poner el cursor en modo "crosshair"
    }
}

   function getCentroide(geometry) {
        let coords = geometry.type === "MultiPolygon" ? geometry.coordinates[0][0] : geometry.coordinates[0];
        let latSum = 0, lngSum = 0;
        coords.forEach(coord => { lngSum += coord[0]; latSum += coord[1]; });
        return { lat: latSum / coords.length, lng: lngSum / coords.length };
    }
    
    function seleccionar(lat, lng, props = null) {
    if (modoSelectorZonasActivo) return;

    selectionLayer.clearLayers();
    distanceLayer.clearLayers();
    
    const z = mymap.getZoom();
    const clicReal = L.latLng(lat, lng);

    // 1. BÚSQUEDA Y SELECCIÓN INTELIGENTE
    let poligonosCandidatos = [];
    layerZonas.eachLayer(function(layer) {
        if (isPointInGeoJSON(clicReal, layer.toGeoJSON())) {
            poligonosCandidatos.push(layer);
        }
    });

    if (poligonosCandidatos.length > 0) {
        poligonosCandidatos.sort((a, b) => {
            let areaA = parseFloat(a.feature.properties.AREA || 0);
            let areaB = parseFloat(b.feature.properties.AREA || 0);
            return areaA - areaB;
        });
        props = poligonosCandidatos[0].feature.properties;
    }

    // 2. LÓGICA DE CENTRADO (SNAP TO GRID)
    let step = PARAMS.RES_PICO;
    if (z < 14.5) step = PARAMS.RES_MACRO;
    else if (z < 17) step = PARAMS.RES_MICRO;
    else if (z < 18.5) step = PARAMS.RES_NANO;

    const xGrid = Math.floor(((lng - ORIGIN.lng) / step) + 0.00001);
    const yGrid = Math.floor(((ORIGIN.lat - lat) / step) + 0.00001);
    const centerLat = ORIGIN.lat - (yGrid * step) - (step / 2);
    const centerLng = ORIGIN.lng + (xGrid * step) + (step / 2);
    const puntoCentro = L.latLng(centerLat, centerLng);

    // 3. VALIDACIÓN DE UBICACIÓN EXTERNA
    if (!props) {
        const popupError = `
            <div style="text-align: center; padding: 10px; min-width: 150px;">
                <div style="color: #f39c12; font-size: 24px; margin-bottom: 5px;">⚠️</div>
                <b style="color: #2c3e50; display: block; margin-bottom: 4px; font-size: 13px;">UBICACIÓN EXTERNA</b>
                <p style="margin: 0; font-size: 11px; color: #7f8c8d;">Punto fuera de la jurisdicción postal.</p>
                <div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; font-size: 10px; color: #95a5a6; font-family: monospace;">
                    ${lat.toFixed(6)}, ${lng.toFixed(6)}
                </div>
            </div>`;
        L.marker(clicReal, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-grey.png', iconSize: [18, 28], iconAnchor: [9, 28] }) })
         .addTo(selectionLayer).bindPopup(popupError).openPopup();
        return;
    }

    // 4. PROCESAMIENTO DE DATOS
    const res = getGridInfo(centerLat, centerLng);
    const zonaID = props.VM_LEVEL2D || "XX";
    const zonaNombre = props.VM_LEVEL || "SIN NOMBRE";
    const provincia = props.PROV_NOMB || "PANAMÁ";
    const estafetaReal = props.ESTAF_NAME || "POR DEFINIR";

    let titulo = "", codigoFinal = "", esNivelZona = false;
    if (z < 13) { titulo = "ZONA POSTAL"; esNivelZona = true; }
    else if (z < 17) { titulo = "ÁREA POSTAL"; codigoFinal = (z < 15) ? `${zonaID}-${res.macro}` : `${zonaID}-${res.macro}${res.micro}`; }
    else if (z < 19) { titulo = "SECTOR POSTAL"; codigoFinal = `${zonaID}-${res.macro}${res.micro}${res.nano}`; }
    else { 
        titulo = "CÓDIGO POSTAL";
        let cadenaCompleta = zonaID + res.macro + res.micro + res.nano + res.pico;
        codigoFinal = cadenaCompleta.substring(0, 5) + "-" + cadenaCompleta.substring(5);
        dibujarRejillaPico(centerLat, centerLng);
    }

    const contenidoQR = `CP-> ${codigoFinal}\nCOORD-> ${centerLat.toFixed(6)},${centerLng.toFixed(6)}\nZONA-> ${zonaNombre}=${zonaID}\nESTAFETA-> ${estafetaReal}\nPROVINCIA-> ${provincia}`;
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(contenidoQR);

    let htmlPopup = `
    <div style="text-align: center; min-width: 175px;">
        <span style="font-size: 9px; color: #666; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 3px; border-bottom: 1px solid #eee;">${titulo}</span>
        ${esNivelZona ? `<div style="color: #1a73e8; font-weight: bold; font-size: 18px; margin: 10px 0;">${zonaNombre}</div>` : `
            <div class="codigo-final" style="margin: 5px 0; font-size: 14px; font-weight: bold;">${codigoFinal}</div>
            <p style="margin: 5px 0; color: #1a73e8; font-weight: bold; font-family: monospace; font-size: 13px;">${zonaNombre}=${zonaID}</p>
            <p style="margin: 3px 0; font-size: 11px;"><b>Estafeta:</b><br>${estafetaReal}</p>
        `}
        <p style="margin: 3px 0; font-size: 11px;"><b>Provincia:</b> ${provincia}</p>
        ${!esNivelZona ? `
            <div style="margin-top: 5px; font-size: 10px; color: #666; font-family: monospace;">Lat: ${centerLat.toFixed(6)}<br>Lon: ${centerLng.toFixed(6)}</div>
            ${z >= 18.5 ? `<div style="text-align: center; margin: 8px 0;"><img src="${qrUrl}" class="qr-code-estilo"></div>` : ''}
            <div class="btn-container" style="margin-top:8px; border-top:1px solid #eee; padding-top:8px;">
                <a href="https://www.google.com/maps/search/?api=1&query=${centerLat},${centerLng}" target="_blank" class="btn-maps">📍 MAPS</a>
                <a href="https://wa.me/?text=Mi+Código+Postal:+${codigoFinal}" target="_blank" class="btn-ws">💬 WS</a>
                <button onclick="buscarEstafetaCercana(${centerLat},${centerLng})" class="btn-cercana">📍 ESTAFETA MAS CERCANA</button>
            </div>
        ` : ''}
    </div>`;

    L.marker(puntoCentro, { icon: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [18, 28], iconAnchor: [9, 28] }) })
    .addTo(selectionLayer)
    .bindPopup(htmlPopup, { 
        minWidth: 160, 
        maxWidth: 200, 
        offset: (z >= 18.5) ? L.point(0, -40) : L.point(0, -20), 
        autoPan: true, 
        autoPanPadding: [50, 50] 
    })
    .openPopup();
}
// --- FUNCIONES DE APOYO PARA EL DIBUJO ---

function dibujarCuadro(lat, lng, step, color) {
    const x = Math.floor(((lng - ORIGIN.lng) / step) + 0.00001);
    const y = Math.floor(((ORIGIN.lat - lat) / step) + 0.00001);
    const sLng = ORIGIN.lng + (x * step);
    const sLat = ORIGIN.lat - (y * step);

    L.rectangle([[sLat, sLng], [sLat - step, sLng + step]], {
        color: color, weight: 3, fillOpacity: 0.2, fillColor: color, interactive: false
    }).addTo(selectionLayer);
}

    
function dibujarRejillaPico(lat, lng) {
    const stepN = PARAMS.RES_NANO;
    const stepP = PARAMS.RES_PICO;
    const xN = Math.floor(((lng - ORIGIN.lng) / stepN) + 0.00001);
    const yN = Math.floor(((ORIGIN.lat - lat) / stepN) + 0.00001);
    const sLngN = ORIGIN.lng + (xN * stepN);
    const sLatN = ORIGIN.lat - (yN * stepN);

    // Líneas de la rejilla
    for (let i = 0; i <= 8; i++) {
        L.polyline([[sLatN, sLngN + (i * stepP)], [sLatN - stepN, sLngN + (i * stepP)]], 
            { color: '#ffffff', weight: 2, opacity: 0.8 }).addTo(selectionLayer);
        L.polyline([[sLatN - (i * stepP), sLngN], [sLatN - (i * stepP), sLngN + stepN]], 
            { color: '#ffffff', weight: 2, opacity: 0.8 }).addTo(selectionLayer);
    }
    
    // Cuadro de 3.3m seleccionado
    const xP = Math.floor(((lng - sLngN) / stepP) + 0.00001);
    const yP = Math.floor(((sLatN - lat) / stepP) + 0.00001);
    const fLat = sLatN - (yP * stepP);
    const fLng = sLngN + (xP * stepP);

    L.rectangle([[fLat, fLng], [fLat - stepP, fLng + stepP]], {
        color: '#f1c40f', weight: 3, fillOpacity: 0.3, fillColor: '#f1c40f'
    }).addTo(selectionLayer);
}

function decodeToLatLng(code8) {
    const idx = c => PARAMS.ALFA.indexOf(c);
    const m = idx(code8[0]) * 30 + idx(code8[1]);
    const mi = idx(code8[2]) * 30 + idx(code8[3]);
    const n = idx(code8[4]) * 30 + idx(code8[5]);
    const p = idx(code8[6]) * 30 + idx(code8[7]);
    const my = Math.floor(m / PARAMS.MACRO_X_COUNT), mx = m % PARAMS.MACRO_X_COUNT;
    const miy = Math.floor(mi / 24), mix = mi % 24;
    const ny = Math.floor(n / 25), nx = n % 25;
    const py = Math.floor(p / 8), px = p % 8;
    const lng = ORIGIN.lng + (((mx * 24 * 25 * 8) + (mix * 25 * 8) + (nx * 8) + px) * PARAMS.RES_PICO) + (PARAMS.RES_PICO/2);
    const lat = ORIGIN.lat - (((my * 24 * 25 * 8) + (miy * 25 * 8) + (ny * 8) + py) * PARAMS.RES_PICO) - (PARAMS.RES_PICO/2);
    return [lat, lng];
}

document.getElementById('search-btn').addEventListener('click', function() {
    let raw = document.getElementById('search-input').value.toUpperCase().replace(/-/g, "");
    let code8 = raw.length >= 10 ? raw.substring(raw.length - 8) : raw;
    if (code8.length === 8) {
        try {
            const coords = decodeToLatLng(code8);
            mymap.setView(coords, 20);
            setTimeout(() => seleccionar(coords[0], coords[1]), 500);
        } catch(e) { alert("Formato incorrecto"); }
    } else { alert("Use 8 o 10 caracteres"); }
});

function buscarEstafetaCercana(lat, lng) {
    distanceLayer.clearLayers();
    const userPt = L.latLng(lat, lng);
    let cercana = null;
    let dMin = Infinity;

    // Escaneamos la capa de estafetas de forma correcta
    layerEstafetas.eachLayer(group => {
        // Como es un GeoJSON, recorremos sus sub-layers (los puntos)
        group.eachLayer(l => {
            if (l.getLatLng) {
                const pt = l.getLatLng();
                const d = userPt.distanceTo(pt);
                if (d < dMin) {
                    dMin = d;
                    cercana = l;
                }
            }
        });
    });

    if (cercana) {
        const estPt = cercana.getLatLng();
        const texto = dMin > 1000 ? (dMin / 1000).toFixed(2) + " km" : Math.round(dMin) + " m";
        
        // Dibujamos la línea punteada
        const line = L.polyline([userPt, estPt], { 
            color: '#c0392b', 
            weight: 4, 
            dashArray: '8, 8',
            opacity: 0.7 
        }).addTo(distanceLayer);

        // Etiqueta de distancia en el centro de la línea
        L.marker(line.getCenter(), { 
            icon: L.divIcon({ 
                className: 'inv',
                html: `<div class="distancia-label">${texto}</div>` 
            }) 
        }).addTo(distanceLayer);

        // Ajustamos el mapa para ver ambos puntos y abrimos la info de la estafeta
        mymap.fitBounds(line.getBounds(), { padding: [100, 100] });
        cercana.openPopup();
    } else {
        alert("No se encontraron estafetas cargadas en el mapa.");
    }
}

function render() {
    layerMacro.clearLayers(); layerMicro.clearLayers(); layerNano.clearLayers();
    const z = mymap.getZoom(), b = mymap.getBounds();
    const draw = (step, layer, labelClass, color, weight, opacity, maxRects) => {
        let sIdxX = Math.floor((b.getWest() - ORIGIN.lng) / step), sIdxY = Math.floor((ORIGIN.lat - b.getNorth()) / step);
        let count = 0;
        for (let lo = ORIGIN.lng + (sIdxX * step); lo < b.getEast() + step; lo += step) {
            for (let la = ORIGIN.lat - (sIdxY * step); la > b.getSouth() - step; la -= step) {
                if (count++ > maxRects) return;
                const info = getGridInfo(la - step/2, lo + step/2);
                L.rectangle([[la, lo], [la - step, lo + step]], { color: color, weight: weight, fill: false, opacity: opacity, interactive: false }).addTo(layer);
                if (labelClass && ((labelClass==='label-macro' && z < 13) || (labelClass==='label-micro' && z >= 13 && z < 16.5))) {
                    const txt = labelClass === 'label-macro' ? info.macro : info.micro;
                    L.marker([la - step/2, lo + step/2], { icon: L.divIcon({className: 'inv'}) }).bindTooltip(txt, { permanent: true, direction: 'center', className: `watermark-tooltip ${labelClass}` }).addTo(layer);
                }
            }
        }
    };
    if (z >= 9) draw(PARAMS.RES_MACRO, layerMacro, 'label-macro', '#1a73e8', 1.5, 0.2, 500);
    if (z >= 13) draw(PARAMS.RES_MICRO, layerMicro, 'label-micro', '#e67e22', 1, 0.2, 800);
    if (z >= 16.5) draw(PARAMS.RES_NANO, layerNano, '', '#2c3e50', 0.5, 0.2, 1500);
}

// --- 1. UBICACIÓN DEL USUARIO ---
function findMe() { 
    mymap.locate({setView: true, maxZoom: 18, enableHighAccuracy: true}); 
}

mymap.on('locationfound', (e) => { 
    layerMiUbicacion.clearLayers(); 

    // Círculo de precisión
    if (e.accuracy) {
        L.circle(e.latlng, {
            radius: e.accuracy / 2, 
            color: '#1a73e8',
            fillColor: '#1a73e8',
            fillOpacity: 0.1,  
            weight: 1
        }).addTo(layerMiUbicacion);
    }

    // Marcador de ubicación azul
    L.circleMarker(e.latlng, {
        radius: 9, 
        color: 'white', 
        fillColor: '#1a73e8', 
        fillOpacity: 1, 
        weight: 3
    }).addTo(layerMiUbicacion); 

    seleccionar(e.latlng.lat, e.latlng.lng); 
});

mymap.on('locationerror', (e) => {
    alert("No se pudo obtener tu ubicación: " + e.message);
});

// --- 2. EVENTOS DE MAPA ---
mymap.on('click', (e) => seleccionar(e.latlng.lat, e.latlng.lng));
mymap.on('moveend', render);

// --- 3. SELECTOR DE CAPAS (BASE Y OVERLAYS) ---
// Asegúrate de que estas variables coincidan con las que definiste al inicio
const baseMaps = {
    "🗺️ Calles": mapaCalles,  // Cámbialo a 'osm' si usaste ese nombre arriba
    "🌍 Satélite": mapaSatelite // Cámbialo a 'googleSatelite' si usaste ese nombre arriba
};

const overlayMaps = {
    "🔲 Zonas": layerZonas, 
    "🟦 Cuadrícula": layerMacro, 
    "⬛ Grillas": layerNano, 
    "🛣️ Rutas": layerRutas, 
    "📍 Estafetas": layerEstafetas, 
    "🔵 Mi Ubicación": layerMiUbicacion 
};

// Pasamos baseMaps como primer argumento para habilitar el cambio de mapa base
L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(mymap);

// Renderizado inicial
render();
</script>
